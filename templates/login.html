<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Risk Map - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        .form h2 { text-align: center; margin-bottom: 1.5rem; color: #1a73e8; }
        .form input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .form button { width: 100%; padding: 0.5rem; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 1rem; }
        .error { color: red; text-align: center; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="form">
        <h2>Global ESG Risk Map</h2>
        <form method="POST" action="/login">
            <input type="text" name="account" placeholder="请输入账号" required>
            <input type="password" name="code" placeholder="请输入密码" required>
            <button type="submit">登录</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
